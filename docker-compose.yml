services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apartment_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-apartment_rent}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Исправлено: теперь база данных сохраняет свои данные, а не конфиги прометеуса
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apartment_user} -d ${POSTGRES_DB:-apartment_rent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apartment_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://apartment_user:password@postgres:5432/apartment_rent
      MODEL_PATH: /app/app/rental_price_model.pkl
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-min-32-chars}
      DEBUG: "False"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: apartment_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: apartment_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: apartment_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: apartment_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/letsencrypt:/var/www/certbot:rw
      - ./nginx/ssl:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    command: /bin/sh -c "while [ ! -f /etc/letsencrypt/live/example.com/fullchain.pem ]; do echo 'waiting for certs'; sleep 2; done; nginx -g 'daemon off;'"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:

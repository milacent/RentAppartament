services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apartment_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-apartment_rent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apartment_user} -d ${POSTGRES_DB:-apartment_rent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: apartment_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://apartment_user:password@postgres:5432/apartment_rent
      MODEL_PATH: /app/app/rental_price_model.pkl
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-min-32-chars}
      DEBUG: "False"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: apartment_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data:

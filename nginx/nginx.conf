# Production-ready nginx config for this project.
# Configured for domain example.com. Place TLS certs in
# ./nginx/ssl (mounted to /etc/letsencrypt in the container).

server {
    listen 80;
    server_name example.com;

    # Allow Let's Encrypt HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # Metrics proxy
    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets - cache aggressively
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|woff2|woff|ttf|svg|eot)$ {
        proxy_pass http://frontend:3000;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Frontend (Next.js) - proxy to node server or static build
    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Notes:
# - Настроено на домен example.com.
# - Use Certbot to obtain certificates and place them under ./nginx/ssl
#   (mounted to /etc/letsencrypt). Example certbot (manual):
#   sudo certbot certonly --webroot -w ./nginx/letsencrypt -d example.com
# - For automated Docker-based cert issuance consider using the official
#   Certbot image or "nginx-proxy" + "letsencrypt-companion" patterns.
